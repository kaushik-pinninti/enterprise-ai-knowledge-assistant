version: '3.8'

services:
  # Main Full-Stack Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=enterprise-secure-jwt-key-2026-super-secret-random-string
      - APP_URL=http://localhost:3000
    restart: always
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Production Relational Database Service (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: enterprise_user
      POSTGRES_PASSWORD: enterprise_secure_db_pass_2026
      POSTGRES_DB: enterprise_kb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Production Cache & Rate-Limiting Broker Service (Redis)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # High-Performance Reverse Proxy & Load Balancer (Nginx)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: always

volumes:
  postgres_data:
  redis_data:
